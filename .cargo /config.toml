[package]
name = "Vorty44"
version = "0.1.0"
edition = "2021"

[dependencies]
rmk = { git = "https://github.com/HaoboGu/rmk", default-features = false, features = ["col2row"] }
# 注意：不加 defmt、vial、storage、split 等任何其他特性

[features]
default = []

[profile.release]
opt-level = "z"        # 极致大小优化
lto = true
codegen-units = 1
panic = "abort"
debug = false
strip = true
